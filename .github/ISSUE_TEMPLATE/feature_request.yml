name: Feature Request
description: Suggest an improvement or new feature
labels: [enhancement]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? Why do you need it?
      placeholder: Describe the workflow or scenario where this would help.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: How should this work? What would the interface look like?
      placeholder: Describe your ideal solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big is this change?
      options:
        - Small — single file or minor tweak
        - Medium — new feature, touches a few files
        - Large — architectural change or new subsystem
    validations:
      required: true
